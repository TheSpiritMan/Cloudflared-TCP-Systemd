name: Build & Release .deb

on:
  push:
    tags:
      - 'v*.*.*'

# 1. ADD PERMISSIONS BLOCK
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.21'

    - name: Build Go binary
      run: |
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o cloudflared-tcp main.go

    - name: Set version
      run: |
        # Use GITHUB_REF_NAME for a cleaner way to get the tag (e.g., 0.1.0)
        CLEAN_VER=$(echo "${{ github.ref_name }}" | sed 's/^v//')
        echo "VERSION=$CLEAN_VER" >> $GITHUB_ENV

    - name: Prepare Debian package
      run: |
        PKG_NAME=cloudflared-tcp
        # Inside 'run', we use $VERSION (shell syntax)
        mkdir -p build/${PKG_NAME}_${VERSION}/usr/local/bin
        mkdir -p build/${PKG_NAME}_${VERSION}/DEBIAN
        cp cloudflared-tcp build/${PKG_NAME}_${VERSION}/usr/local/bin/
        # Copy control file
        cp deb-package/debian/control build/${PKG_NAME}_${VERSION}/DEBIAN/control

        # Copy maintainer scripts
        cp deb-package/scripts/postinst build/${PKG_NAME}_${VERSION}/DEBIAN/postinst
        cp deb-package/scripts/postrm build/${PKG_NAME}_${VERSION}/DEBIAN/postrm

        # Make scripts executable
        chmod 755 build/${PKG_NAME}_${VERSION}/DEBIAN/postinst
        chmod 755 build/${PKG_NAME}_${VERSION}/DEBIAN/postrm

    - name: Build .deb package
      run: |
        dpkg-deb --build build/cloudflared-tcp_${VERSION}
        # Moving it to the root so the next step finds it easily
        mv build/cloudflared-tcp_${VERSION}.deb .

    - name: Install changelog generator
      run: |
        gem install --user-install github_changelog_generator
        echo "${HOME}/.local/share/gem/ruby/$(ls ~/.local/share/gem/ruby)/bin" >> $GITHUB_PATH

    - name: Generate changelog
      run: |
        github_changelog_generator --user ${{ github.repository_owner }} \
          --project ${GITHUB_REPOSITORY##*/} \
          --future-release v${{ env.VERSION }} \
          > CHANGELOG.md

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        # 2. USE EXPRESSION SYNTAX ${{ env.VERSION }}
        files: cloudflared-tcp_${{ env.VERSION }}.deb
        body: |
          $(cat CHANGELOG.md)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}